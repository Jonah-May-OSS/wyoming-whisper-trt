# To get a newer version, you will need to update the SHA.
# You can also reference a tag or branch, but the action may change without warning.

name: Publish Docker Images
permissions:
  contents: read
  pull-requests: write

on:
  release:
    types: [published]

jobs:
   build_and_push_images:
    name: Build and Push Docker Images
    runs-on: self-hosted
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      # GPU driver (nvidia runtime), Docker (dind sidecar) are provided by the
      # self-hosted ARC runner; building the image doesn't need host CUDA/nvcc
      # (CUDA lives in the Dockerfile base image), so no in-job installs needed.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@f4e8deed0c3c26542279f4042c0e1d059cbf012d
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@21162887f0d6e25b4e8eafb0cf44cf9bf7f6acd3

      - name: Log in to Docker Hub
        uses: docker/login-action@ba754150c9dbbaa912ae0ac3cfba43f84195cef2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@c3b064c6d7c32446d6bc214ea075f1caad2de35a
        with:
          images: captnspdr/wyoming-whisper-trt

      - name: Prepare iGPU Tags
        id: prepare-igpu-tags
        shell: bash
        run: |
          TAGS="${{ steps.meta.outputs.tags }}"
          echo "Original iGPU TAGS: $TAGS"

          IGPU_TAGS=""
          for T in $TAGS; do
            IGPU_TAGS="${IGPU_TAGS}\n${T}-igpu"
          done

          IGPU_TAGS="$(echo -e "$IGPU_TAGS" | sed '/^$/d')"

          echo "Final iGPU tags (multi-line):"
          echo "$IGPU_TAGS"

          # Use here-doc for multi-line output
          echo "igpu_tags<<EOF" >> $GITHUB_OUTPUT
          echo "$IGPU_TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and Push dGPU Image (multi-arch)
        id: push-dgpu
        uses: docker/build-push-action@83bfd93ab480705a7b99a2ed02765137f5ab55ba
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64

      - name: Build and Push ARM64 iGPU Image
        id: push-arm64-igpu
        uses: docker/build-push-action@83bfd93ab480705a7b99a2ed02765137f5ab55ba
        with:
          context: .
          file: ./Dockerfile.igpu
          push: true
          tags: ${{ steps.prepare-igpu-tags.outputs.igpu_tags }}
          labels: ${{ steps.meta.outputs.labels }}-igpu
          platforms: linux/arm64
