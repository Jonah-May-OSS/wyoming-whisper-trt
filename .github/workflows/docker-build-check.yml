name: Docker Build Check

# The publish workflow only builds on release, so image changes otherwise ship
# unvalidated. This builds the dGPU image (amd64, no push) and runs an import
# smoke test whenever the Dockerfile / deps / entrypoint change, catching venv
# relocation or missing-runtime-lib breakage before a release. Also available
# via manual dispatch.

permissions:
  contents: read

on:
  pull_request:
    paths:
      - "Dockerfile"
      - "requirements.txt"
      - "run.sh"
      - "script/setup"
      - ".github/workflows/docker-build-check.yml"
  workflow_dispatch: {}

concurrency:
  group: docker-build-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-check:
    name: Build dGPU image (amd64) + import smoke test
    runs-on: self-hosted
    steps:
      - name: Check out the repo
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          # torch2trt is a submodule and the image COPYs local source.
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@21162887f0d6e25b4e8eafb0cf44cf9bf7f6acd3

      - name: Build dGPU image (amd64, load locally, no push)
        uses: docker/build-push-action@83bfd93ab480705a7b99a2ed02765137f5ab55ba
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: wyoming-whisper-trt:build-check
          platforms: linux/amd64

      - name: Import smoke test (venv relocated onto the slim runtime, no GPU)
        run: |
          docker run --rm \
            --entrypoint /usr/src/wyoming-whisper-trt/.venv/bin/python \
            -w /usr/src/wyoming-whisper-trt \
            wyoming-whisper-trt:build-check \
            -c "import torch, tensorrt, torch2trt, whisper_trt; \
                print('torch', torch.__version__); \
                print('tensorrt', tensorrt.__version__); \
                print('whisper_trt', whisper_trt.__version__)"

      - name: Report image size
        run: |
          docker images wyoming-whisper-trt:build-check --format '{{.Size}}'
